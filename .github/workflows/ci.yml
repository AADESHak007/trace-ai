name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Lint
      run: npm run lint

    - name: Run Tests
      run: npm run test

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Build
      run: npm run build
      env:
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        NEXT_PUBLIC_API_URL: "http://localhost:3000"
        GOOGLE_AI_KEY: "dummy_key"
        REDIS_URL: "redis://localhost:6379"
        SMTP_HOST: "smtp.dummy.com"
        SMTP_PORT: "587"
        SMTP_USER: "dummy"
        SMTP_PASS: "dummy"
        SMTP_FROM: "dummy"
